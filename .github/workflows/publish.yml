name: Publish

# Publishes the package to npm when a GitHub Release is published.
# Requires an NPM_TOKEN repository secret (an npm automation/publish token).
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # enables npm provenance once the repo/package is public
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      # Guard: the release tag (e.g. v0.1.0) must match package.json version.
      - name: Verify version matches tag
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "package.json version ($PKG_VERSION) does not match release tag ($TAG)" >&2
            exit 1
          fi
      - name: Publish to npm
        run: npm publish
        # For a public repo/package, add provenance: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
