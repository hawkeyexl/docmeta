# Release pipeline. On every push to a release branch, semantic-release reads
# the conventional commits since the last tag, computes the next version, and
# (when warranted) updates CHANGELOG/package.json, tags, creates a GitHub
# Release, and publishes to npm.
#
#   main      -> @latest
#   next      -> @next prerelease
#   feat/**   -> per-branch prerelease channel
#
# Publishes to npm via OIDC trusted publishing (https://docs.npmjs.com/trusted-publishers):
# no NPM_TOKEN secret. npm exchanges the workflow's OIDC token for a short-lived,
# scoped publish credential, so the `id-token: write` permission below is what
# authorizes the publish (and mints provenance automatically). The trusted
# publisher configured on npmjs.com must name this workflow file (release.yml).
#
# The release commit (CHANGELOG/package.json bump), tag, and GitHub Release are
# pushed/created using a GitHub App token, NOT the default GITHUB_TOKEN. `main`
# has a ruleset requiring all changes via PR, and the default token can't bypass
# it, so @semantic-release/git's direct push is rejected (GH013). The App is
# added as the sole bypass actor on that ruleset; its short-lived token is what
# lets the release commit land. Requires two secrets — RELEASE_APP_ID and
# RELEASE_APP_PRIVATE_KEY — and the App installed with Contents/Issues/Pull
# requests: read & write. See docs/maintainers/releasing.md for the one-time setup.
#
# Requires npm CLI >= 11.5.1 and @semantic-release/npm >= 13 (Node 24 bundles a
# new enough npm). Do NOT set setup-node's registry-url or any NPM_TOKEN /
# NODE_AUTH_TOKEN: a written-out auth token in .npmrc shadows OIDC and breaks it.
name: Release

on:
  push:
    branches:
      - main
      - next
      - "feat/**"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write # OIDC trusted publishing to npm + provenance (public package)

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # The husky commit-msg hook isn't useful in CI, and semantic-release's
    # release commit embeds the full changelog (long lines). Disable husky.
    env:
      HUSKY: "0"
    steps:
      # Mint a short-lived token for the App that's whitelisted to bypass the
      # `main` ruleset, so semantic-release can push the release commit.
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

      - name: Release
        env:
          # App token (not the default GITHUB_TOKEN): semantic-release uses it both
          # to push the release commit/tag past the main ruleset and for the GitHub
          # Release + issue/PR comments. No NPM_TOKEN/NODE_AUTH_TOKEN: the npm
          # publish authenticates via OIDC trusted publishing (id-token above).
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: npx semantic-release
