# Release pipeline. On every push to a release branch, semantic-release reads
# the conventional commits since the last tag, computes the next version, and
# (when warranted) updates CHANGELOG/package.json, tags, creates a GitHub
# Release, and publishes to npm.
#
#   main      -> @latest
#   next      -> @next prerelease
#   feat/**   -> per-branch prerelease channel
#
# Publishes to npm via OIDC trusted publishing (https://docs.npmjs.com/trusted-publishers):
# no NPM_TOKEN secret. npm exchanges the workflow's OIDC token for a short-lived,
# scoped publish credential, so the `id-token: write` permission below is what
# authorizes the publish (and mints provenance automatically). The trusted
# publisher configured on npmjs.com must name this workflow file (release.yml).
# The default GITHUB_TOKEN covers the release commit, tag, and GitHub Release.
#
# Requires npm CLI >= 11.5.1 and @semantic-release/npm >= 13 (Node 24 bundles a
# new enough npm). Do NOT set setup-node's registry-url or any NPM_TOKEN /
# NODE_AUTH_TOKEN: a written-out auth token in .npmrc shadows OIDC and breaks it.
name: Release

on:
  push:
    branches:
      - main
      - next
      - "feat/**"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write # OIDC trusted publishing to npm + provenance (public package)

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # The husky commit-msg hook isn't useful in CI, and semantic-release's
    # release commit embeds the full changelog (long lines). Disable husky.
    env:
      HUSKY: "0"
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

      - name: Release
        env:
          # No NPM_TOKEN/NODE_AUTH_TOKEN: @semantic-release/npm authenticates the
          # publish via OIDC trusted publishing using the id-token permission above.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
