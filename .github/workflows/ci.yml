name: CI

# PRs are validated here (and commit messages by commitlint.yml). Pushes to
# release branches are validated + released by release.yml, so we don't also
# run CI on them to avoid duplicate work.
on:
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
